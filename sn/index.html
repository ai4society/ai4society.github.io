<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=https://ai4society.github.io/sn-ye/">
  <link rel="canonical" href="https://ai4society.github.io/sn-ye/">
  <title>Redirecting to SN-YE</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: #f7fafc;
      color: #1f2937;
    }

    main {
      width: min(90vw, 520px);
      padding: 32px;
      border: 1px solid #dbe4ef;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 16px 36px rgba(31, 41, 55, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.4rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
    }

    a {
      color: #0f6e8c;
      font-weight: 700;
    }
  </style>
  <script>
    window.location.replace('https://ai4society.github.io/sn-ye/');
  </script>
</head>
<body>
  <main>
    <h1>Redirecting to SN-YE</h1>
    <p>
      If you are not redirected automatically, open
      <a href="https://ai4society.github.io/sn-ye/">SN-YE: Surya Namaskar Yoga Explorer</a>.
    </p>
  </main>
</body>
</html>
